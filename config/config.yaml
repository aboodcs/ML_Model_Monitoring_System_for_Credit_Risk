artifacts_root: artifacts

data_ingestion:
  root_dir: artifacts/data_ingestion
  source_URL: https://raw.githubusercontent.com/maixbach/credit-risk-analysis-using-ML/main/dataset/train.csv
  local_data_file: artifacts/data_ingestion/train.csv
  unzip_dir: artifacts/data_ingestion

data_validation:
  root_dir: artifacts/data_validation
  unzip_data_dir: artifacts/data_ingestion
  STATUS_FILE: artifacts/data_validation/status.txt

data_transformation:
  root_dir: artifacts/data_transformation
  data_path: artifacts/data_ingestion/train.csv
  preprocessor_path: artifacts/data_transformation/scaler.pkl

model_trainer:
  root_dir: artifacts/model_trainer
  train_data_path: artifacts/data_transformation/X_train.csv
  test_data_path: artifacts/data_transformation/X_test.csv
  model_path: artifacts/model_trainer/model.joblib

model_evaluation:
  root_dir: artifacts/model_evaluation
  test_data_path: artifacts/data_transformation/X_test.csv
  model_path: artifacts/model_trainer/model.joblib
  metric_file_path: artifacts/model_evaluation/metrics.json
